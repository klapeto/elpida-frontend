<h2>Filters</h2>
<div class="filter-container">

    <div class="button non-a-button" (click)="advanced = false" [ngClass]="{'active': !advanced}">Simple Filters</div>
    <div class="button non-a-button" (click)="advanced = true" [ngClass]="{'active': advanced}">Advanced Filters</div>

    <app-custom-filters *ngIf="advanced; else elseBlock" (submitted)="onSubmit($event)"></app-custom-filters>
    <ng-template #elseBlock><app-simple-filters></app-simple-filters></ng-template>
</div>
