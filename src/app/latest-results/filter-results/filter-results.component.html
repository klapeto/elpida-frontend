<app-group-box [title]="'Filters'">
    <div class="filter-container">
        <div *ngFor="let filter of filters" >
            <app-filter-case [filter]="filter"></app-filter-case>
            <hr/>
        </div>

        <input type="button" (click)="onSubmit()" value="Submit">
    </div>
</app-group-box>
