<div class="filter-group-row">
    <strong>{{filter.factory.title}}:</strong>
    <div>
        <select *ngIf="filter.factory.allowComparison" [(ngModel)]="filter.selected">
            <option *ngFor="let option of filter.factory.options">
                {{option}}
            </option>
        </select>
        <input class="inputBox" [type]="getInputType()" [(ngModel)]="filter.value"/>
    </div>
</div>
